version: '3.8'

services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:latest
    container_name: newcreation-web
    restart: unless-stopped
    networks:
      - gateway_network
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.newcreation.mediamanager.tech
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.newcreation-web.rule=Host(`newcreation.mediamanager.tech`)"
      - "traefik.http.routers.newcreation-web.entrypoints=websecure"
      - "traefik.http.routers.newcreation-web.tls.certresolver=myresolver"
      - "traefik.http.services.newcreation-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=gateway_network"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: newcreation-api
    restart: unless-stopped
    networks:
      - gateway_network
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.newcreation-api.rule=Host(`api.newcreation.mediamanager.tech`)"
      - "traefik.http.routers.newcreation-api.entrypoints=websecure"
      - "traefik.http.routers.newcreation-api.tls.certresolver=myresolver"
      - "traefik.http.services.newcreation-api.loadbalancer.server.port=3001"
      - "traefik.docker.network=gateway_network"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  gateway_network:
    external: true
